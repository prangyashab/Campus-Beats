server:
  port: 8081

# JWT Configuration
jwt:
  secret: campusBeatsSecretKey2024ForJWTTokenGenerationWithExtraLengthToMeetSecurityRequirementsForHS256Algorithm
  expiration: 86400000 # 24 hours in milliseconds

# CORS Configuration
cors:
  # Add common local dev origins so multiple frontends can use this backend during development
  allowed-origins: http://localhost:5173,http://localhost:3000,http://localhost:4000,http://localhost:3001
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

# File Upload Configuration
file:
  upload:
    dir: ./uploads/
    max-size: 50MB

# WebSocket Configuration
websocket:
  # Mirror CORS origins for websocket usage during local development
  allowed-origins: http://localhost:5173,http://localhost:3000,http://localhost:4000,http://localhost:3001

logging:
  level:
    com.campusbeats: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG