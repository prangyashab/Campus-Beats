<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF--8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Beats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Custom scrollbar for webkit browsers */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1f2937; /* bg-gray-800 */
      }
      ::-webkit-scrollbar-thumb {
        background: #4b5563; /* bg-gray-600 */
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #6b7280; /* bg-gray-500 */
      }
      @keyframes pulse-beat {
        0%, 100% {
          transform: scale(1);
          box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1), 0 0 15px rgba(139, 92, 246, 0.4);
        }
        50% {
          transform: scale(1.03);
          box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1), 0 0 30px rgba(139, 92, 246, 0.7);
        }
      }
      .animate-pulse-beat {
        animation: pulse-beat 2s infinite ease-in-out;
      }
      .card-group:hover .card-group-hover\:scale-105 {
        transform: scale(1.05);
      }
      .card-group:hover .card-group-hover\:bg-opacity-40 {
        background-opacity: 0.4;
      }
      .card-group:hover .card-group-hover\:opacity-100 {
        opacity: 1;
      }
      .card-group:hover .card-group-hover\:scale-100 {
        transform: scale(1);
      }
      
      /* Hide scrollbar for horizontal scroll sections */
      .scrollbar-hide {
        -ms-overflow-style: none;  /* Internet Explorer 10+ */
        scrollbar-width: none;  /* Firefox */
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;  /* Safari and Chrome */
      }
    </style>

    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.17.0"
  }
}
</script>

</head>

</html>
